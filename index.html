<style>
:root {
  --cream: #FAF7F2;
  --white: #FFFFFF;
  --ink: #1A1A1A;
  --ink-soft: #4A4A4A;
  --ink-muted: #8A8A8A;
  --accent: #C5A572;      /* Gold - matching LEV GROUP brand */
  --accent-dark: #9B7F4E;
  --accent-soft: #F5EFE0;
  --line: #E8E4DC;
  --line-soft: #F0EDE5;
  --green: #1F7A4A;
  --green-soft: #E7F4ED;
  --red: #B8390D;
  --red-soft: #FCE8DF;
  --blue: #2B5F9E;
  --blue-soft: #E6EEF9;
  --navy: #1E3A5F;
  --navy-soft: #E8EEF6;
  --shadow-sm: 0 1px 2px rgba(26,26,26,0.05);
  --shadow-md: 0 4px 12px rgba(26,26,26,0.06);
  --shadow-lg: 0 12px 32px rgba(26,26,26,0.08);
  --shadow-xl: 0 24px 60px rgba(26,26,26,0.16);
}

/* ============== Landing / Hero ============== */
.landing {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.landing-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0 20px;
}
.landing-nav .brand-logo { height: 56px; }
.landing-nav-links { display: flex; gap: 8px; }
.landing-nav-links button {
  padding: 9px 16px;
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 8px;
  font-family: inherit;
  font-size: 0.86rem;
  color: var(--ink-soft);
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.landing-nav-links button:hover {
  background: var(--white);
  border-color: var(--accent);
  color: var(--ink);
}

.hero {
  position: relative;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: var(--shadow-xl);
  min-height: 560px;
  background: var(--ink);
  display: flex;
  align-items: stretch;
}
.hero-image {
  position: absolute;
  inset: 0;
  background-image: url('assets/hero-new-client.jpg');
  background-size: cover;
  background-position: center;
  filter: saturate(1.05);
}
.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg,
    rgba(26,26,26,0.78) 0%,
    rgba(30,58,95,0.55) 55%,
    rgba(197,165,114,0.25) 100%);
}
.hero-content {
  position: relative;
  z-index: 2;
  display: grid;
  grid-template-columns: 1fr 1fr;
  width: 100%;
  padding: 60px 60px;
  gap: 40px;
  align-items: center;
}
.hero-text { color: var(--white); }
.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 7px 14px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 999px;
  font-size: 0.8rem;
  color: var(--white);
  font-weight: 500;
  letter-spacing: 0.05em;
  margin-bottom: 22px;
}
.hero-eyebrow::before {
  content: '';
  width: 7px; height: 7px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--accent);
}
.hero-headline {
  font-family: 'Instrument Serif', serif;
  font-weight: 400;
  font-size: 3.6rem;
  line-height: 1.05;
  letter-spacing: -0.02em;
  margin-bottom: 18px;
  color: var(--white);
}
.hero-headline em {
  font-style: italic;
  color: var(--accent);
}
.hero-sub {
  font-size: 1.1rem;
  line-height: 1.55;
  opacity: 0.9;
  margin-bottom: 32px;
  max-width: 480px;
}
.hero-cta {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 18px 36px;
  background: var(--accent);
  color: var(--ink);
  border: none;
  border-radius: 14px;
  font-family: inherit;
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 12px 32px rgba(197,165,114,0.45);
  transition: all 0.25s cubic-bezier(.2,.8,.2,1);
  letter-spacing: 0.01em;
}
.hero-cta:hover {
  transform: translateY(-2px);
  background: #D4B583;
  box-shadow: 0 18px 42px rgba(197,165,114,0.55);
}
.hero-cta .arrow {
  font-size: 1.2rem;
  transition: transform 0.2s;
}
.hero-cta:hover .arrow { transform: translateX(-4px); }

.hero-trust {
  margin-top: 28px;
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
}
.hero-trust .pill {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--white);
  font-size: 0.88rem;
  opacity: 0.9;
}
.hero-trust .pill .dot {
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
}

.hero-card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.22);
  border-radius: 20px;
  padding: 28px;
  color: var(--white);
}
.hero-card h3 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 18px;
  letter-spacing: 0.02em;
}
.hero-features {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.hero-feat {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px;
  background: rgba(255,255,255,0.08);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.12);
}
.hero-feat-ico {
  width: 38px; height: 38px;
  background: var(--accent);
  color: var(--ink);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}
.hero-feat-txt strong {
  display: block;
  font-size: 0.95rem;
  margin-bottom: 2px;
}
.hero-feat-txt span {
  font-size: 0.82rem;
  opacity: 0.82;
  line-height: 1.4;
}

.landing-values {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-top: 32px;
}
.value-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 24px;
  text-align: right;
  transition: all 0.25s;
}
.value-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
  border-color: var(--accent);
}
.value-ico {
  width: 46px; height: 46px;
  background: linear-gradient(135deg, var(--accent-soft), var(--accent));
  color: var(--ink);
  border-radius: 12px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
  margin-bottom: 14px;
}
.value-card h4 {
  font-size: 1.05rem;
  font-weight: 700;
  margin-bottom: 6px;
}
.value-card p {
  font-size: 0.9rem;
  color: var(--ink-soft);
  line-height: 1.55;
}

.landing-footer {
  margin-top: auto;
  padding: 24px 0 12px;
  text-align: center;
  color: var(--ink-muted);
  font-size: 0.82rem;
}
.landing-footer .sep { margin: 0 10px; opacity: 0.5; }

/* ============== Admin hero banner ============== */
.admin-hero {
  position: relative;
  border-radius: 18px;
  overflow: hidden;
  margin-bottom: 22px;
  box-shadow: var(--shadow-lg);
  height: 200px;
  background: var(--navy);
}
.admin-hero-bg {
  position: absolute;
  inset: 0;
  background-image: url('assets/hero-quote.jpg');
  background-size: cover;
  background-position: center 30%;
  filter: blur(1px) saturate(1.1);
  transform: scale(1.05);
}
.admin-hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(100deg, rgba(10,25,45,0.82) 0%, rgba(30,58,95,0.65) 55%, rgba(30,58,95,0.45) 100%);
}
.admin-hero-logo {
  height: 120px;
  width: auto;
  filter: brightness(0) invert(1) drop-shadow(0 4px 24px rgba(0,0,0,0.4));
  opacity: 0.98;
}
.admin-hero-inner {
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  color: var(--white);
}
.admin-hero-title {
  font-family: 'Instrument Serif', serif;
  font-size: 2rem;
  font-weight: 400;
  line-height: 1.15;
  margin-bottom: 6px;
}
.admin-hero-sub {
  font-size: 0.95rem;
  opacity: 0.9;
}
.admin-hero-badge {
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.3);
  padding: 10px 18px;
  border-radius: 999px;
  font-size: 0.85rem;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
}
.admin-hero-badge::before {
  content: '';
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--accent);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

@media (max-width: 900px) {
  .hero-content { grid-template-columns: 1fr; padding: 40px 28px; }
  .hero-headline { font-size: 2.5rem; }
  .hero { min-height: auto; }
  .landing-values { grid-template-columns: 1fr; }
  .admin-hero { height: auto; padding: 20px; }
  .admin-hero-inner { flex-direction: column; align-items: flex-start; gap: 12px; padding: 0; }
  .admin-hero-title { font-size: 1.5rem; }
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--cream);
  color: var(--ink);
  font-family: 'Heebo', system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.55;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

body.preview-mode { background: #EEEAE0; }

.serif { font-family: 'Instrument Serif', Georgia, serif; font-weight: 400; }

h1, h2, h3 { font-weight: 600; line-height: 1.2; }
h1 { font-size: 2rem; letter-spacing: -0.02em; }
h2 { font-size: 1.4rem; }
h3 { font-size: 1.1rem; }

/* Layout */
.app { max-width: 1080px; margin: 0 auto; padding: 24px 20px 120px; }

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0 24px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 16px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}
.brand-mark {
  width: 44px; height: 44px;
  background: var(--ink);
  color: var(--accent);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Instrument Serif', serif;
  font-size: 1.6rem;
  font-style: italic;
  font-weight: 700;
  letter-spacing: -0.05em;
}
.brand-logo {
  height: 64px;
  width: auto;
  max-width: 100%;
  object-fit: contain;
}
.brand-name {
  font-weight: 700;
  font-size: 1.05rem;
  letter-spacing: 0.02em;
}
.brand-sub {
  font-size: 0.75rem;
  color: var(--ink-muted);
  font-style: italic;
  font-family: 'Instrument Serif', serif;
}

.nav-tabs {
  display: flex;
  gap: 4px;
  background: var(--line-soft);
  border-radius: 10px;
  padding: 4px;
}
.nav-tab {
  padding: 9px 18px;
  border-radius: 7px;
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--ink-soft);
  cursor: pointer;
  border: none;
  background: transparent;
  font-family: inherit;
  transition: all 0.15s;
}
.nav-tab.active {
  background: var(--white);
  color: var(--ink);
  box-shadow: var(--shadow-sm);
}
.nav-tab:hover:not(.active) { color: var(--ink); }

/* Section layouts */
.section {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 24px;
  margin-bottom: 18px;
  box-shadow: var(--shadow-sm);
}

.section-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--line-soft);
}
.section-title h2 {
  font-size: 1.15rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title h2 .icon {
  width: 28px; height: 28px;
  background: var(--accent-soft);
  color: var(--accent-dark);
  border-radius: 7px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
}
.section-subtitle { font-size: 0.82rem; color: var(--ink-muted); }

.section.collapsible .section-title {
  cursor: pointer;
  margin-bottom: 0;
  padding-bottom: 14px;
  border-bottom: 1px solid transparent;
  transition: border-color 0.15s;
}
.section.collapsible.open .section-title {
  border-bottom-color: var(--line-soft);
  margin-bottom: 18px;
}
.section.collapsible .section-content { display: none; }
.section.collapsible.open .section-content { display: block; }
.section.collapsible .toggle-arrow {
  transition: transform 0.2s;
  color: var(--ink-muted);
  font-size: 1.1rem;
}
.section.collapsible.open .toggle-arrow { transform: rotate(180deg); }

/* Form */
.form-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px 16px;
}
.form-grid.three { grid-template-columns: repeat(3, 1fr); }
.form-field { display: flex; flex-direction: column; gap: 6px; }
.form-field.full { grid-column: 1 / -1; }
.form-field label {
  font-size: 0.82rem;
  color: var(--ink-soft);
  font-weight: 500;
}
.form-field label .hint {
  color: var(--ink-muted);
  font-weight: 400;
  font-size: 0.78rem;
}
.form-field input,
.form-field textarea,
.form-field select {
  padding: 11px 13px;
  border: 1px solid var(--line);
  border-radius: 8px;
  font-family: inherit;
  font-size: 0.95rem;
  background: var(--white);
  color: var(--ink);
  transition: all 0.15s;
  font-weight: 400;
  width: 100%;
}
.form-field input:focus,
.form-field textarea:focus,
.form-field select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(197,165,114,0.15);
}
.form-field textarea { resize: vertical; min-height: 80px; line-height: 1.6; }

/* Checkbox */
.checkbox-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  background: var(--line-soft);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid var(--line);
}
.checkbox-row:hover { border-color: var(--accent); }
.checkbox-row.checked { background: var(--accent-soft); border-color: var(--accent); }
.checkbox-row input[type="checkbox"] {
  width: 18px; height: 18px;
  accent-color: var(--accent-dark);
  cursor: pointer;
}
.checkbox-row label {
  cursor: pointer;
  flex: 1;
  font-size: 0.92rem;
  font-weight: 500;
}
.checkbox-row .price { font-size: 0.85rem; color: var(--ink-muted); font-weight: 400; }

/* Locations Table */
.loc-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 4px;
}
.loc-table th {
  text-align: right;
  padding: 10px 8px;
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--ink-muted);
  border-bottom: 1px solid var(--line);
  background: var(--line-soft);
}
.loc-table td {
  padding: 6px 4px;
  border-bottom: 1px solid var(--line-soft);
  vertical-align: middle;
}
.loc-table tbody tr:last-child td { border-bottom: none; }
.loc-table input,
.loc-table select {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--line);
  border-radius: 6px;
  font-family: inherit;
  font-size: 0.9rem;
  background: var(--white);
}
.loc-table input.num { text-align: center; }
.loc-table .del-btn {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--ink-muted);
  width: 30px; height: 30px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  font-family: inherit;
}
.loc-table .del-btn:hover {
  background: var(--red-soft);
  border-color: var(--red);
  color: var(--red);
}

.add-row-btn {
  margin-top: 12px;
  padding: 10px 16px;
  background: var(--line-soft);
  border: 1px dashed var(--line);
  color: var(--ink-soft);
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.88rem;
  font-weight: 500;
  font-family: inherit;
  width: 100%;
  transition: all 0.15s;
}
.add-row-btn:hover {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent-dark);
}

/* Component rows */
.comp-list { display: flex; flex-direction: column; gap: 10px; }
.comp-row {
  display: grid;
  grid-template-columns: 1fr 140px 40px;
  gap: 8px;
  align-items: center;
}
.comp-row input {
  padding: 9px 12px;
  border: 1px solid var(--line);
  border-radius: 7px;
  font-family: inherit;
  font-size: 0.9rem;
  background: var(--white);
  width: 100%;
}

/* Elevator */
.elevator-row {
  display: grid;
  grid-template-columns: 1fr 1fr 100px 120px 40px;
  gap: 8px;
  align-items: center;
  padding: 10px;
  background: var(--line-soft);
  border-radius: 8px;
  margin-bottom: 8px;
}
.elevator-row input,
.elevator-row select {
  padding: 8px 10px;
  border: 1px solid var(--line);
  border-radius: 6px;
  font-family: inherit;
  font-size: 0.88rem;
  background: var(--white);
  width: 100%;
}
.elevator-price {
  background: var(--white);
  padding: 8px;
  border-radius: 6px;
  text-align: center;
  font-weight: 600;
  color: var(--accent-dark);
  font-size: 0.88rem;
  font-variant-numeric: tabular-nums;
}

/* Building info chips */
.building-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}
.building-chip {
  padding: 6px 12px;
  background: var(--line-soft);
  border-radius: 20px;
  font-size: 0.82rem;
  color: var(--ink-soft);
  font-weight: 500;
}
.building-chip strong { color: var(--ink); }

/* Summary */
.summary {
  background: linear-gradient(135deg, var(--white) 0%, var(--accent-soft) 100%);
  border: 1px solid var(--accent);
  border-radius: 14px;
  padding: 24px;
  margin-bottom: 18px;
  box-shadow: var(--shadow-md);
}
.summary h2 {
  font-family: 'Instrument Serif', serif;
  font-weight: 400;
  font-size: 1.8rem;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.summary-section {
  background: rgba(255,255,255,0.6);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 12px;
}
.summary-section-title {

const fmt = (n) => '₪' + Number(n || 0).toLocaleString('he-IL', { maximumFractionDigits: 0 });
const fmtDec = (n, d=2) => Number(n || 0).toLocaleString('he-IL', { maximumFractionDigits: d, minimumFractionDigits: 0 });

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function waitForFirebase() {
  return new Promise((resolve) => {
    if (window.FB) { resolve(); return; }
    window.addEventListener('firebase-ready', resolve, { once: true });
  });
}

// ================================================================
// TARIFFS — load/save
// ================================================================
async function loadTariffs() {
  try {
    await waitForFirebase();
    const ref = window.FB.doc(window.FB.db, 'settings', CONFIG.settingsDoc);
    const snap = await window.FB.getDoc(ref);
    if (snap.exists()) {
      State.tariffs = { ...DEFAULT_TARIFFS, ...snap.data() };
    } else {
      State.tariffs = structuredClone(DEFAULT_TARIFFS);
    }
  } catch (err) {
    console.warn('Failed to load tariffs, using defaults', err);
    State.tariffs = structuredClone(DEFAULT_TARIFFS);
  }
}

async function saveTariffs() {
  try {
    await waitForFirebase();
    const ref = window.FB.doc(window.FB.db, 'settings', CONFIG.settingsDoc);
    await window.FB.setDoc(ref, State.tariffs);
    return true;
  } catch (err) {
    console.error(err);
    return false;
  }
}

// ================================================================
// CALCULATION
// ================================================================
function calcQuote(data, tariffs) {
  const t = tariffs;

  // 1. ניקיון - לפי מיקומים
  const weeklyMinutes = (data.cleaningLocations || []).reduce(
    (s, l) => s + (Number(l.minutes) || 0) * (Number(l.timesPerWeek) || 0), 0
  );
  const weeklyHours = weeklyMinutes / 60;
  const weeklyBase = weeklyHours * t.cleaning.hourlyRate;
  const monthlyCleaningBase = weeklyBase * t.cleaning.weeksPerMonth;
  const cleaningAfterExpansion = monthlyCleaningBase * (1 + t.cleaning.expansionPct / 100);
  const cleaningAfterProfit = cleaningAfterExpansion * (1 + t.cleaning.profitPct / 100);
  const cleaningTotal = cleaningAfterProfit;

  // 2. מעליות - מחיר בסיס + תוספת לכל קומה מעל freeFloorsUpTo
  const commercialMult = t.elevatorCommercialMultiplier ?? 1.5;
  const basePrice = t.elevatorBasePrice ?? 1000;
  const extraPerFloor = t.elevatorExtraPerFloor ?? 100;
  const freeFloorsUpTo = t.elevatorFreeFloorsUpTo ?? 8;
  const floorsCount = Number(data.building?.floors) || 0;
  const extraFloors = Math.max(0, floorsCount - freeFloorsUpTo);
  const pricePerElevator = basePrice + extraFloors * extraPerFloor;
  const elevatorsTotal = (data.elevators || []).reduce((s, e) => {
    const typeMult = e.type === 'commercial' ? commercialMult : 1;
    const qty = Number(e.quantity) || 1;
    const price = pricePerElevator * typeMult * qty;
    e._price = price;
    return s + price;
  }, 0);

  // 3. גינון
  const gardeningTotal = (Number(data.gardeningVisitsPerMonth) || 0) * t.gardening.pricePerVisit;

  // 3b. חצרנות
  const caretakingTotal = (Number(data.caretakingVisitsPerMonth) || 0) * (t.caretaking?.pricePerVisit || 250);

  // 4. מערכות מורכבות
  const complexSystemsTotal = data.hasComplexSystems ? t.complexSystems.price : 0;

  // 5. רווח חברת ניהול (לדירה × מספר דירות)
  const apartmentsCount = Number(data.building?.apartments) || 0;
  const managementProfit = t.management.baseProfit * apartmentsCount;

  // 6. תוספות מותאמות
  const customExtrasTotal = (data.customExtras || []).reduce((s, e) => s + (Number(e.amount) || 0), 0);

  // סה"כ לפני מע"מ והנחה
  const subtotalBeforeDiscount =
    cleaningTotal +
    elevatorsTotal +
    gardeningTotal +
    caretakingTotal +
    complexSystemsTotal +
    managementProfit +
    customExtrasTotal;

  // הנחה (סכום קבוע)
  const discountAmount = Number(data.discount) || 0;
  const subtotalAfterDiscount = Math.max(0, subtotalBeforeDiscount - discountAmount);

  // מע"מ
  const vatPct = Number(data.vatPct ?? t.vatPct) || 0;
  const vatAmount = subtotalAfterDiscount * (vatPct / 100);
  const totalMonthly = subtotalAfterDiscount + vatAmount;

  // פר דירה
  const apartments = Number(data.building?.apartments) || 1;
  const perApartment = totalMonthly / apartments;

  return {
    weeklyMinutes,
    weeklyHours: +weeklyHours.toFixed(2),
    monthlyCleaningBase: +monthlyCleaningBase.toFixed(2),
    cleaningTotal: +cleaningTotal.toFixed(2),
    elevatorsTotal: +elevatorsTotal.toFixed(2),
    gardeningTotal: +gardeningTotal.toFixed(2),
    caretakingTotal: +caretakingTotal.toFixed(2),
    complexSystemsTotal: +complexSystemsTotal.toFixed(2),
    managementProfit: +managementProfit.toFixed(2),
    customExtrasTotal: +customExtrasTotal.toFixed(2),
    subtotalBeforeDiscount: +subtotalBeforeDiscount.toFixed(2),
    discountAmount: +discountAmount.toFixed(2),
    subtotalAfterDiscount: +subtotalAfterDiscount.toFixed(2),
    vatPct,
    vatAmount: +vatAmount.toFixed(2),
    totalMonthly: +totalMonthly.toFixed(2),
    perApartment: +perApartment.toFixed(2),
    apartments
  };
}

function route() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const view = params.get('view');

  if (id) {
    State.view = 'client';
    State.quoteId = id;
    renderClient();
  } else if (view === 'archive') {
    State.view = 'archive';
    renderArchive();
  } else if (view === 'settings') {
    State.view = 'settings';
    renderSettings();
  } else if (view === 'new') {
    State.view = 'admin';
    renderAdmin();
  } else {
    State.view = 'landing';
    renderLanding();
  }
}

function renderElevators() {
  const body = $('#elevators-body');
  if (!body) return;
  if (!State.draft.elevators.length) {
    body.innerHTML = '<div style="color:var(--ink-muted);font-size:0.88rem;padding:10px;text-align:center;background:var(--line-soft);border-radius:8px;">אין מעליות. לחץ "+" להוספה.</div>';
    return;
  }
  const tariffs = State.tariffs?.elevators || DEFAULT_TARIFFS.elevators;
  const commercialMult = State.tariffs?.elevatorCommercialMultiplier ?? 1.5;
  const basePrice = State.tariffs?.elevatorBasePrice ?? 1000;
  const extraPerFloor = State.tariffs?.elevatorExtraPerFloor ?? 100;
  const freeFloorsUpTo = State.tariffs?.elevatorFreeFloorsUpTo ?? 8;
  const floorsCount = Number(State.draft.building?.floors) || 0;
  const extraFloors = Math.max(0, floorsCount - freeFloorsUpTo);
  const pricePerElevator = basePrice + extraFloors * extraPerFloor;
  body.innerHTML = State.draft.elevators.map((e, i) => {
    const typeMult = e.type === 'commercial' ? commercialMult : 1;
    const qty = Number(e.quantity) || 1;
    const price = pricePerElevator * typeMult * qty;
    return `
      <div class="elevator-row">
        <input placeholder="שם המעלית" value="${escapeHtml(e.name || '')}" oninput="App.updateElev(${i},'name',this.value)">
        <select onchange="App.updateElev(${i},'company',this.value)">
          ${tariffs.map(t => `<option value="${escapeHtml(t.company)}" ${e.company === t.company ? 'selected' : ''}>${escapeHtml(t.company)}</option>`).join('')}
        </select>
        <select onchange="App.updateElev(${i},'type',this.value)">
          <option value="regular" ${e.type !== 'commercial' ? 'selected' : ''}>רגילה</option>
          <option value="commercial" ${e.type === 'commercial' ? 'selected' : ''}>מסחרית</option>
        </select>
        <input class="num" type="number" min="1" value="${e.quantity || 1}" placeholder="כמות מעליות" oninput="App.updateElev(${i},'quantity',Number(this.value)||1)">
        <div class="elevator-price">${fmt(price)}</div>
        <button class="del-btn" onclick="App.removeElevator(${i})">×</button>
      </div>
    `;
  }).join('');
}

function initSignaturePad() {
  const canvas = $('#sig-canvas');
  const placeholder = $('#sig-placeholder');
  const resize = () => {
    const ratio = Math.max(window.devicePixelRatio || 1, 1);
    canvas.width = canvas.offsetWidth * ratio;
    canvas.height = canvas.offsetHeight * ratio;
    canvas.getContext("2d").scale(ratio, ratio);
    if (State.signaturePad) State.signaturePad.clear();
  };
  resize();
  window.addEventListener('resize', resize);

  State.signaturePad = new SignaturePad(canvas, {
    penColor: '#1A1A1A',
    minWidth: 1.2,
    maxWidth: 2.6,
    backgroundColor: 'rgba(255,255,255,0)'
  });

  State.signaturePad.addEventListener('beginStroke', () => {
    placeholder.style.display = 'none';
  });
}

async function renderArchive() {
  document.body.className = '';

        </div>
      </div>

  `;

  try {
    await waitForFirebase();
    const q = window.FB.query(
      window.FB.collection(window.FB.db, CONFIG.collection),
      window.FB.orderBy('createdAt', 'desc')
    );
    const snap = await window.FB.getDocs(q);
    const list = $('#archive-list');
    if (snap.empty) {
      list.innerHTML = `<div class="empty-state"><h3>אין הצעות עדיין</h3><p>הצעות שתיצור יופיעו כאן.</p></div>`;
      return;
    }
    list.innerHTML = '';
    snap.forEach(d => {
      const q = { id: d.id, ...d.data() };
      const total = q.calc?.totalMonthly || 0;
      const perApt = q.calc?.perApartment || 0;
      const signed = !!q.signature;
      const card = document.createElement('div');
      card.className = 'archive-card';
      card.onclick = () => location.search = `?id=${q.id}`;
      card.innerHTML = `
        <div>
          <div class="title">${escapeHtml(q.client.name || '—')} · ${escapeHtml(q.building?.address || '')}</div>
          <div class="meta">הצעה #${q.quoteNumber} · ${fmtDate(q.createdAt)} · ${q.building?.apartments || '?'} דירות</div>
        </div>
        <span class="status-badge ${signed ? 'status-signed' : 'status-pending'}">
          ${signed ? '✓ נחתם' : '⏳ ממתין'}
        </span>
        <div class="amount">${fmt(perApt)}<small>לדירה</small></div>
      `;
      list.appendChild(card);
    });
  } catch (err) {
    console.error(err);
    $('#archive-list').innerHTML = `<div class="empty-state"><h3>שגיאה בטעינה</h3><p>ודא שהגדרת את Firebase בקובץ.</p></div>`;
  }
}

  document.body.className = '';
  const t = State.tariffs || DEFAULT_TARIFFS;

  $('#root').innerHTML = `
    <div class="app">
      ${topbar('settings')}

      <div class="section">
        <div class="section-title">
          <h2><span class="icon">⚙️</span>מרכז הבקרה · תעריפים</h2>
          <span class="section-subtitle">ערכים אלה משמשים בחישוב כל הצעה חדשה</span>
        </div>

        <div class="settings-group">
          <h3>🧹 ניקיון</h3>
          <div class="form-grid three">
            <div class="form-field">
              <label>שכר שעתי למנקה (₪)</label>
              <input type="number" id="t-cleaning-hourly" value="${t.cleaning.hourlyRate}">
            </div>
            <div class="form-field">
              <label>צו הרחבה (%)</label>
              <input type="number" id="t-cleaning-expansion" value="${t.cleaning.expansionPct}">
            </div>
            <div class="form-field">
              <label>רווח על ניקיון (%)</label>
              <input type="number" id="t-cleaning-profit" value="${t.cleaning.profitPct}">
            </div>
          </div>
        </div>

        <div class="settings-group">
          <h3>🏢 רווח חברת הניהול</h3>
          <div class="form-grid">
            <div class="form-field">
              <label>מחיר לדירה לחודש (₪)</label>
              <input type="number" id="t-management" value="${t.management.baseProfit}">
            </div>
          </div>
        </div>

        <div class="settings-group">
          <h3>🛗 תמחור מעליות</h3>
          <div class="form-grid three">
            <div class="form-field">
              <label>מחיר בסיס למעלית (₪)</label>
              <input type="number" id="t-elev-base" value="${t.elevatorBasePrice ?? 1000}">
            </div>
            <div class="form-field">
              <label>תוספת לכל קומה נוספת (₪)</label>
              <input type="number" id="t-elev-extra" value="${t.elevatorExtraPerFloor ?? 100}">
            </div>
            <div class="form-field">
              <label>תוספת מתחילה מעל קומה</label>
              <input type="number" id="t-elev-freefloors" value="${t.elevatorFreeFloorsUpTo ?? 8}">
            </div>
          </div>
          <div class="form-field" style="margin-top:10px;">
            <label>מכפיל מעליות מסחריות (×)</label>
            <input type="number" step="0.1" id="t-elev-commercial" value="${t.elevatorCommercialMultiplier ?? 1.5}">
          </div>
          <h4 style="margin-top:16px;font-size:0.9rem;color:var(--ink-muted);">רשימת חברות (לבחירה בלבד)</h4>
          <table class="tariff-table">
            <thead>
              <tr>
                <th>חברה</th>
                <th style="width:60px"></th>
              </tr>
            </thead>
            <tbody id="elev-tariffs">
              ${t.elevators.map((e, i) => `
                <tr>
                  <td><input value="${escapeHtml(e.company)}" data-elev="${i}" data-field="company"></td>
                  <td><button class="del-btn" onclick="App.removeElevTariff(${i})">×</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          <button class="add-row-btn" onclick="App.addElevTariff()" style="margin-top:10px;">+ הוסף חברה</button>
        </div>

        <div class="settings-group">
          <h3>🌿 גינון</h3>
          <div class="form-grid">
            <div class="form-field">
              <label>מחיר לפעם (₪)</label>
              <input type="number" id="t-gardening" value="${t.gardening.pricePerVisit}">
            </div>
          </div>
        </div>

        <div class="settings-group">
          <h3>🧺 חצרנות</h3>
          <div class="form-grid">
            <div class="form-field">
              <label>מחיר לפעם (₪)</label>
              <input type="number" id="t-caretaking" value="${t.caretaking?.pricePerVisit ?? 250}">
            </div>
          </div>
        </div>

        <div class="settings-group">
          <h3>⚙️ מערכות מורכבות</h3>
          <div class="form-grid">
            <div class="form-field">
              <label>תוספת חודשית (₪)</label>
              <input type="number" id="t-complex" value="${t.complexSystems.price}">
              <span class="hint">כיבוי אש, מאגרי מים, משאבות וכו'</span>
            </div>
          </div>
        </div>

        <div class="settings-group">
          <h3>💼 מע"מ</h3>
          <div class="form-grid">
            <div class="form-field">
              <label>ברירת מחדל למע"מ (%)</label>
              <input type="number" id="t-vat" value="${t.vatPct}">
            </div>
          </div>
        </div>

        <div class="btn-row">
          <button class="btn btn-accent" onclick="App.saveTariffs()">💾 שמור שינויים</button>
          <button class="btn btn-ghost" onclick="App.resetTariffs()">↺ אפס לברירות מחדל</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">
          <h2><span class="icon">🏢</span>פרטי העסק</h2>
          <span class="section-subtitle">מוצגים בהצעת המחיר ובדפדפן</span>
        </div>
        <div class="form-grid">
          <div class="form-field"><label>שם חברה</label><input value="${escapeHtml(CONFIG.business.name)}" disabled></div>
          <div class="form-field"><label>סלוגן</label><input value="${escapeHtml(CONFIG.business.subtitle)}" disabled></div>
          <div class="form-field"><label>טלפון</label><input value="${escapeHtml(CONFIG.business.phone)}" disabled></div>
          <div class="form-field"><label>מייל</label><input value="${escapeHtml(CONFIG.business.email)}" disabled></div>
          <div class="form-field"><label>כתובת</label><input value="${escapeHtml(CONFIG.business.address)}" disabled></div>
          <div class="form-field"><label>ע.מ</label><input value="${escapeHtml(CONFIG.business.taxId)}" disabled></div>
        </div>
        <p style="font-size:0.82rem;color:var(--ink-muted);margin-top:14px;">
          לעריכת פרטי העסק - ערוך את קובץ ה-HTML ישירות בחלק <code>CONFIG.business</code>.
        </p>
      </div>
    </div>
  `;

  // Listen for tariff input changes
  $$('[data-elev]').forEach(inp => {
    inp.addEventListener('input', (e) => {
      const i = +e.target.dataset.elev;
      const field = e.target.dataset.field;
      const val = field === 'pricePerStation' ? (Number(e.target.value) || 0) : e.target.value;
      State.tariffs.elevators[i][field] = val;
    });
  });
}

// ================================================================
// APP API
// ================================================================
const App = {
  // Admin: locations
  addLocation() {
    State.draft.cleaningLocations.push({ name: '', minutes: 0, timesPerWeek: 1 });
    renderLocations();
    updateSummary();
  },
  addLocationPreset(name, timesPerWeek) {
    State.draft.cleaningLocations.push({ name, minutes: 0, timesPerWeek });
    renderLocations();
    updateSummary();
  },
  updateLoc(i, field, value) {
    State.draft.cleaningLocations[i][field] = value;
    updateSummary();
  },
  removeLocation(i) {
    State.draft.cleaningLocations.splice(i, 1);
    renderLocations();
    updateSummary();
  },

  // Admin: elevators
  addElevator() {
    const firstCompany = State.tariffs?.elevators?.[0]?.company || 'Kone';
    State.draft.elevators.push({ name: '', company: firstCompany, type: 'regular', quantity: 1 });
    renderElevators();
    updateSummary();
  },
  updateElev(i, field, value) {
    const numFields = ['quantity'];
    State.draft.elevators[i][field] = numFields.includes(field) ? (Number(value) || 0) : value;
    renderElevators();
    updateSummary();
  },
  removeElevator(i) {
    State.draft.elevators.splice(i, 1);
    renderElevators();
    updateSummary();
  },

  // Admin: extras
  addExtra() {
    State.draft.customExtras.push({ name: '', amount: 0 });
    renderExtras();
    updateSummary();
  },
  updateExtra(i, field, value) {
    State.draft.customExtras[i][field] = value;
    updateSummary();
  },
  removeExtra(i) {
    State.draft.customExtras.splice(i, 1);
    renderExtras();
    updateSummary();
  },

  // Toggles
  toggleComplexSystems() {
    const cb = $('#f-complex');
    cb.checked = !cb.checked;
    State.draft.hasComplexSystems = cb.checked;
    $('#complex-systems-row').classList.toggle('checked', cb.checked);
    updateSummary();
  },

  toggleSec(id) {
    const sec = $('#' + id);
    sec.classList.toggle('open');
  },

  resetDraft() {
    if (!confirm('האם לאפס את כל השדות?')) return;
    State.draft = null;
    renderAdmin();
  },

  // Create quote
  async createQuote() {
    const data = State.draft;

    // Validation
    if (!data.client.name?.trim()) { toast('חובה להזין שם נציגות הבניין', 'error'); return; }
    if (!data.building.address?.trim()) { toast('חובה להזין כתובת בניין', 'error'); return; }
    if (!data.building.apartments || data.building.apartments < 1) { toast('חובה להזין מספר דירות', 'error'); return; }

    const calc = calcQuote(data, State.tariffs);
    if (calc.totalMonthly <= 0) { toast('הסכום חייב להיות גדול מ-0', 'error'); return; }

    try {
      await waitForFirebase();
      const id = shortId();
      const quoteNumber = await getNextQuoteNumber();

      const payload = {
        ...data,
        calc,
        quoteNumber,
        shareId: id,
        tariffsSnapshot: State.tariffs,  // שמירת התעריפים שהיו בזמן יצירה
        createdAt: window.FB.serverTimestamp(),
        signature: null,
        signedAt: null,
        status: 'pending'
      };

      await window.FB.setDoc(
        window.FB.doc(window.FB.db, CONFIG.collection, id),
        payload
      );

      const url = `${location.origin}${location.pathname}?id=${id}`;
      $('#modal-link').textContent = url;
      State.lastLink = url;
      State.lastQuote = { id, ...payload };
      $('#modal').classList.add('active');
    } catch (err) {
      console.error(err);
      toast('שגיאה ביצירת ההצעה - בדוק הגדרות Firebase', 'error');
    }
  },

  copyLink() {
    navigator.clipboard.writeText(State.lastLink)
      .then(() => toast('הקישור הועתק ✓', 'success'))
      .catch(() => toast('לא ניתן להעתיק - העתק ידנית', 'error'));
  },

  shareWhatsApp() {
    const q = State.lastQuote;
    const msg = `שלום${q?.client?.representative ? ' ' + q.client.representative : ''},\nהצעת המחיר לניהול הבניין ב${q?.building?.address || ''} מוכנה.\n\nניתן לעיין ולחתום בקישור:\n${State.lastLink}\n\nבברכה,\n${CONFIG.business.name}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
  },

  shareSignedWhatsApp() {
    const url = `${location.origin}${location.pathname}?id=${State.quoteId}`;
    const msg = `שלום,\nהצעת המחיר לניהול הבניין נחתמה. לצפייה והורדת PDF:\n${url}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
  },

  closeModal() {
    $('#modal').classList.remove('active');
  },

  previewClient() {
    const data = State.draft;
    if (!data.client.name?.trim() || !data.building.address?.trim() || !data.building.apartments) {
      toast('נא למלא לפחות שם לקוח, כתובת ומספר דירות', 'error');
      return;
    }
    State.quote = {
      ...data,
      calc: calcQuote(data, State.tariffs),
      quoteNumber: 'תצוגה',
      createdAt: new Date(),
      tariffsSnapshot: State.tariffs
    };
    State.view = 'client';
    document.removeEventListener('input', adminInputHandler);
    document.removeEventListener('change', adminInputHandler);
    renderClient();
  },

  // Signature
  clearSig() {
    if (State.signaturePad) {
      State.signaturePad.clear();
      $('#sig-placeholder').style.display = 'block';
    }
  },

  async submitSignature() {
    const name = $('#sig-name').value.trim();
    const role = $('#sig-role').value.trim();

    if (!name) { toast('חובה להזין שם מלא', 'error'); return; }
    if (!State.signaturePad || State.signaturePad.isEmpty()) { toast('חובה לחתום', 'error'); return; }

    const btn = $('#btn-submit-sig');
    btn.disabled = true;
    btn.textContent = 'שומר...';

    const image = State.signaturePad.toDataURL('image/png');

    try {
      await waitForFirebase();
      const ref = window.FB.doc(window.FB.db, CONFIG.collection, State.quoteId);
      await window.FB.updateDoc(ref, {
        signature: { name, idOrRole: role, image },
        signedAt: window.FB.serverTimestamp(),
        status: 'signed'
      });

      sendNotifications(name);

      State.quote = null;
      await renderClient();
      toast('החתימה נשמרה בהצלחה ✓', 'success');
    } catch (err) {
      console.error(err);
      toast('שגיאה בשמירת החתימה', 'error');
      btn.disabled = false;
      btn.textContent = '✓ אישור וחתימה';
    }
  },

  // PDF Download
  async downloadPDF() {
    toast('מייצר PDF...');
    const docEl = document.getElementById('doc-to-pdf');
    try {
      const canvas = await html2canvas(docEl, {
        scale: 2,
        useCORS: true,
        backgroundColor: '#ffffff',
        logging: false
      });
      const imgData = canvas.toDataURL('image/png');
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p', 'mm', 'a4');
      const pageW = pdf.internal.pageSize.getWidth();
      const pageH = pdf.internal.pageSize.getHeight();
      const imgW = pageW;
      const imgH = (canvas.height * imgW) / canvas.width;

      if (imgH <= pageH) {
        pdf.addImage(imgData, 'PNG', 0, 0, imgW, imgH);
      } else {
        let heightLeft = imgH;
        let position = 0;
        pdf.addImage(imgData, 'PNG', 0, position, imgW, imgH);
        heightLeft -= pageH;
        while (heightLeft > 0) {
          position = heightLeft - imgH;
          pdf.addPage();
          pdf.addImage(imgData, 'PNG', 0, position, imgW, imgH);
          heightLeft -= pageH;
        }
      }

      const q = State.quote;
      const safeName = (q.building?.address || q.client?.name || 'ללא-שם').replace(/\s+/g, '-').replace(/[\\\/:*?"<>|]/g, '');
      const filename = `הצעת-מחיר-${q.quoteNumber}-${safeName}.pdf`;
      pdf.save(filename);
      toast('הקובץ הורד ✓', 'success');
    } catch (err) {
      console.error(err);
      toast('שגיאה ביצירת PDF', 'error');
    }
  },

  // Settings - tariffs
  addElevTariff() {
    State.tariffs.elevators.push({ company: 'חברה חדשה' });
    renderSettings();
  },
  removeElevTariff(i) {
    State.tariffs.elevators.splice(i, 1);
    renderSettings();
  },
  async saveTariffs() {
    // Collect values from inputs
    State.tariffs.cleaning.hourlyRate = Number($('#t-cleaning-hourly').value) || 70;
    State.tariffs.cleaning.expansionPct = Number($('#t-cleaning-expansion').value) || 35;
    State.tariffs.cleaning.profitPct = Number($('#t-cleaning-profit').value) || 10;
    State.tariffs.management.baseProfit = Number($('#t-management').value) || 100;
    State.tariffs.elevatorBasePrice = Number($('#t-elev-base').value) || 1000;
    State.tariffs.elevatorExtraPerFloor = Number($('#t-elev-extra').value) || 100;
    State.tariffs.elevatorFreeFloorsUpTo = Number($('#t-elev-freefloors').value) || 8;
    State.tariffs.elevatorCommercialMultiplier = Number($('#t-elev-commercial').value) || 1.5;
    State.tariffs.gardening.pricePerVisit = Number($('#t-gardening').value) || 400;
    if (!State.tariffs.caretaking) State.tariffs.caretaking = { pricePerVisit: 250 };
    State.tariffs.caretaking.pricePerVisit = Number($('#t-caretaking').value) || 250;
    State.tariffs.complexSystems.price = Number($('#t-complex').value) || 500;
    State.tariffs.vatPct = Number($('#t-vat').value) || 18;

    const ok = await saveTariffs();
    if (ok) toast('התעריפים נשמרו ✓', 'success');
    else toast('שגיאה בשמירה', 'error');
  },
  resetTariffs() {
    if (!confirm('לאפס את כל התעריפים לברירת המחדל?')) return;
    State.tariffs = structuredClone(DEFAULT_TARIFFS);
    renderSettings();
  }
};
window.App = App;

// ================================================================
// NOTIFICATIONS
// ================================================================
function sendNotifications(signerName) {
  const q = State.quote;

  // ntfy.sh
  try {
    fetch(`https://ntfy.sh/${CONFIG.ntfyTopic}`, {
      method: 'POST',
      body: `🎉 הצעת המחיר של ${q.client.name || 'לקוח'} (${q.building?.address || ''}) נחתמה על ידי ${signerName}. סכום: ${fmt(q.calc.totalMonthly)}/חודש`,
      headers: {
        'Title': 'הצעת מחיר נחתמה ✓',
        'Priority': 'high',
        'Tags': 'tada,page_with_curl'
      }
    }).catch(() => {});
  } catch(e) {}

  // EmailJS
  try {
    if (window.emailjs && CONFIG.emailjs.publicKey !== "YOUR_PUBLIC_KEY") {
      emailjs.init(CONFIG.emailjs.publicKey);
      emailjs.send(CONFIG.emailjs.serviceId, CONFIG.emailjs.templateId, {
        to_email: CONFIG.notifyEmail,
        client_name: q.client.name,
        building_address: q.building?.address || '',
        signer_name: signerName,
        total_amount: fmt(q.calc.totalMonthly),
        per_apartment: fmt(q.calc.perApartment),
        quote_number: q.quoteNumber,
        view_link: `${location.origin}${location.pathname}?id=${State.quoteId}`
      }).catch(() => {});
    }
  } catch(e) {}
}

async function getNextQuoteNumber() {
  try {
    const snap = await window.FB.getDocs(window.FB.collection(window.FB.db, CONFIG.collection));
    return 'LG-' + String(snap.size + 1).padStart(4, '0');
  } catch {
    return 'LG-' + String(Date.now()).slice(-4);
  }
}

// ================================================================
// BOOT
// ================================================================
async function boot() {
  await loadTariffs();
  try {
    await waitForFirebase();
    State.fbReady = true;
  } catch {}
  $('#loading').style.display = 'none';
  $('#root').style.display = 'block';
  route();
}

window.addEventListener('DOMContentLoaded', boot);
</script>

</body>
</html>
